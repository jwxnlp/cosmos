name: Publish docs

# Build the MkDocs site and deploy it to GitHub Pages.
# Pages source must be set to "GitHub Actions" (Settings → Pages → Source).
on:
  push:
    branches: [main]
    # Only rebuild when something that affects the site changes.
    paths:
      - "**.md"
      - "**.ipynb"
      - "mkdocs.yml"
      - "docs-requirements.txt"
      - "cookbooks/**"
      - ".github/workflows/docs.yml"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Least-privilege token scopes required to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer run supersede an in-progress one, but never cancel a live deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git-based "last updated" timestamps

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r docs-requirements.txt

      - name: Build site
        # Not --strict: the repo has pre-existing broken doc links (e.g. RELEASE.md
        # → release_notes/v0p1.md). Warnings still appear in the log; fix them and
        # add --strict back to enforce link integrity on every deploy.
        run: mkdocs build --site-dir site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
